<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السجل العائلي</title>
    <meta name="description" content="نظام السجل المدني العائلي - إدارة بيانات الأسر والأفراد">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- App Shell -->
    <div id="appShell" class="app-shell">
        <!-- Sidebar Overlay (mobile) -->
        <div id="sidebarOverlay" class="sidebar-overlay"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="fas fa-users"></i>
                    <span>السجل العائلي</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <i class="fas fa-home"></i><span>الرئيسية</span>
                </a>
                <a href="#" class="nav-item" data-page="all-members">
                    <i class="fas fa-users-cog"></i><span>جميع الأفراد</span>
                </a>
                <a href="#" class="nav-item" data-page="settings">
                    <i class="fas fa-cog"></i><span>إعداد وتصميم ابو حازم</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="btn btn-outline btn-full">
                    <i class="fas fa-home"></i> الرئيسية
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <button id="menuToggle" class="menu-toggle" aria-label="القائمة">
                    <i class="fas fa-bars"></i>
                </button>
                <h2 id="pageTitle">الرئيسية</h2>
                <div class="top-bar-actions">
                    <button id="themeToggle" class="btn btn-icon btn-outline" aria-label="تبديل المظهر"
                        style="font-size:18px">
                        <i class="fas fa-sun"></i>
                    </button>
                </div>
            </header>
            <div id="mainContent" class="content-area">
                <!-- Dynamic content rendered here -->
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-dialog">
            <div class="modal-header">
                <h3 id="modalTitle"></h3>
                <button class="modal-close" id="modalCloseBtn" aria-label="إغلاق"><i class="fas fa-times"></i></button>
            </div>
            <div id="modalBody" class="modal-body"></div>
            <div id="modalFooter" class="modal-footer hidden"></div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="db.js"></script>
    <script src="pages.js"></script>
    <script src="extras.js"></script>
    <script src="app.js"></script>
</body>

</html>
